services:
  cassandra-user-service:
    image: cassandra:5.0.8
    container_name: cassandra-user-service
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: cassandra-user-service
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra-user-service-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 60s

  cassandra-init:
    image: cassandra:5.0.8
    container_name: cassandra-user-service-init
    depends_on:
      cassandra-user-service:
        condition: service_healthy
    volumes:
      - ./docker/cassandra/init.cql:/init.cql
    command: >
      bash -c "cqlsh cassandra-user-service 9042 -f /init.cql"
    restart: "no"

volumes:
  cassandra-user-service-data:
